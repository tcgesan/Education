<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable="no">
    <title>Tense</title>
    <link rel="stylesheet" href="tense.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
 
</head>
<body>
    


    <button class="back-button" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i></button>
<div class="all">
    
    <div id="timer">15</div>
    <div id="question"></div>
    <div id="answers">
        <div class="answer" onclick="checkAnswer(0)"></div>
        <div class="answer" onclick="checkAnswer(1)"></div>
        <div class="answer" onclick="checkAnswer(2)"></div>
        <div class="answer" onclick="checkAnswer(3)"> </div>
    </div>
    <button id="next" onclick="nextQuestion()">Next</button>
    
    <audio id="correctSound" src="Correct.mp3"></audio>
    <audio id="incorrectSound" src="incorrect.mp3"></audio>

</div>
    <script src="tense.js"></script>
   
</body>
</html>
